name: Vault-AI Release Robot

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: vault
            asset_name: vault-ai-linux-x64
          - os: windows-latest
            artifact_name: vault.exe
            asset_name: vault-ai-windows-x64.exe
          - os: macos-13
            artifact_name: vault
            asset_name: vault-ai-macos-intel
          - os: macos-latest
            artifact_name: vault
            asset_name: vault-ai-macos-arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: pyinstaller --onefile --name vault cli.py

      - name: Archive build artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
          chmod +x dist/${{ matrix.asset_name }}

      - name: Archive build artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          move dist\${{ matrix.artifact_name }} dist\${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
